<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开通钱包 - 选择认证方式</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <button class="back-btn" id="backBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="header-title">开通钱包</h1>
            <div class="header-placeholder"></div>
        </header>

        <!-- 内容区域 -->
        <main class="content">
            <div class="section">
                <h2 class="page-title">选择认证方式</h2>
                <p class="page-subtitle">请选择一种方式完成实名认证，以开通您的钱包</p>

                <!-- 认证方式选项 -->
                <div class="auth-options">
                    <!-- 二维码扫码认证 -->
                    <label class="auth-option-card">
                        <input type="radio" name="authMethod" value="qrcode" class="auth-radio">
                        <div class="option-content">
                            <div class="option-icon qrcode-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="9" y1="3" x2="9" y2="21"/>
                                    <line x1="15" y1="3" x2="15" y2="21"/>
                                </svg>
                            </div>
                            <div class="option-info">
                                <h3 class="option-title">二维码扫码认证</h3>
                                <p class="option-desc">使用手机摄像头扫描二维码，快速完成认证</p>
                                <div class="option-steps">
                                    <span class="step-tag">1 扫描二维码</span>
                                    <span class="step-tag">2 完成认证</span>
                                </div>
                            </div>
                            <div class="radio-indicator"></div>
                        </div>
                    </label>

                    <!-- 短信通知认证 -->
                    <label class="auth-option-card">
                        <input type="radio" name="authMethod" value="sms" class="auth-radio" checked>
                        <div class="option-content">
                            <div class="option-icon sms-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                            </div>
                            <div class="option-info">
                                <h3 class="option-title">短信通知认证</h3>
                                <p class="option-desc">接收短信链接，完成身份验证</p>
                                <div class="option-steps">
                                    <span class="step-tag">1 获取验证链接</span>
                                    <span class="step-tag">2 填写信息</span>
                                    <span class="step-tag">3 完成认证</span>
                                </div>
                            </div>
                            <div class="radio-indicator"></div>
                        </div>
                    </label>
                </div>

                <!-- 安全提示 -->
                <div class="security-tip">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M9 12l2 2 4-4"/>
                    </svg>
                    <p>我们采用银行级加密技术保护您的个人信息安全，认证过程仅用于身份验证</p>
                </div>
            </div>

            <!-- 底部按钮 -->
            <footer class="footer">
                <button class="next-btn disabled" id="nextBtn" disabled>下一步</button>
            </footer>
        </main>
    </div>

    <script src="../scripts/main.js"></script>
</body>
</html>
