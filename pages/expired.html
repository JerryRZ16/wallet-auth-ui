<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证过期</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <button class="back-btn" id="backBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="header-title">认证过期</h1>
            <div class="header-placeholder"></div>
        </header>

        <!-- 内容区域 -->
        <main class="content">
            <div class="section expired-section">
                <!-- 过期图标 -->
                <div class="error-circle">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>

                <h2 class="main-title">验证链接已过期</h2>
                <p class="sub-title">短信验证链接已超过有效期</p>
                <p class="sub-title">请重新选择认证方式</p>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button class="primary-btn full-width" id="resendBtn">
                        重新发送短信验证
                        <span class="btn-subtitle">获取新的短信验证链接</span>
                    </button>
                </div>

                <!-- 帮助链接 -->
                <div class="help-footer">
                    <p>遇到其他问题？</p>
                    <a href="#" class="help-link">帮助中心</a>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/expired.js"></script>
</body>
</html>
