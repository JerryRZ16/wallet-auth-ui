<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短信认证</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <button class="back-btn" id="backBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="header-title">短信认证</h1>
            <div class="header-placeholder"></div>
        </header>

        <!-- 内容区域 -->
        <main class="content">
            <div class="section sms-result-section">
                <!-- 成功图标 -->
                <div class="success-circle">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>

                <h2 class="main-title">短信已发送</h2>
                <p class="sub-title">验证链接已发送至负责人手机</p>
                
                <div class="phone-number">
                    +86 ****** 8888
                </div>

                <div class="expire-info">
                    验证链接有效期：3天
                </div>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button class="primary-btn" id="refreshBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        刷新状态
                    </button>
                    <button class="outline-btn" id="resendBtn" disabled>
                        重发短信 <span class="countdown" id="countdown">(60s)</span>
                    </button>
                </div>

                <!-- 提示信息 -->
                <div class="info-tip">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    <p>请负责人查收短信并完成认证，认证完成后可点击"刷新状态"更新页面</p>
                </div>
            </div>

            <!-- 返回按钮 -->
            <footer class="footer">
                <button class="outline-btn full-width" id="backToPrevious">返回上一步</button>
            </footer>
        </main>
    </div>

    <script src="../scripts/sms.js"></script>
</body>
</html>
